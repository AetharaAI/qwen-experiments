services:
  qwen-provider:
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    env_file: .env
    environment:
      QWEN_EXPERIMENT_MODEL_PATH: /models/voice/Qwen3-TTS-12Hz-1.7B-CustomVoice
      QWEN_EXPERIMENT_TOKENIZER_PATH: /models/voice/Qwen3-TTS-Tokenizer-12Hz
      NVIDIA_VISIBLE_DEVICES: ${QWEN_PROVIDER_GPU_IDS:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "127.0.0.1:${QWEN_PROVIDER_PORT:-8072}:${QWEN_PROVIDER_PORT:-8072}"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:/models:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}
    networks:
      default:
        aliases:
          - qwen-provider

networks:
  default:
    external: true
    name: ${QWEN_PROVIDER_NETWORK_NAME:-aether-voice-mesh}
